    <div class="hero-girl">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 520" width="260" height="520">
        <!-- Long flowing hair back -->
        <ellipse cx="130" cy="120" rx="72" ry="110" fill="#3b1f0a"/>

        <!-- Face -->
        <ellipse cx="130" cy="115" rx="52" ry="60" fill="#f5c5a3"/>

        <!-- Hair top/front -->
        <ellipse cx="130" cy="75" rx="52" ry="32" fill="#3b1f0a"/>

        <ellipse cx="130" cy="68" rx="10" ry="8" fill="#2a1205"/>

        <!-- Eyebrows -->
        <path d="M105 95 Q115 89 122 93" stroke="#3b1f0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M138 93 Q145 89 155 95" stroke="#3b1f0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <ellipse cx="113" cy="105" rx="9" ry="7" fill="white"/>
        <ellipse cx="147" cy="105" rx="9" ry="7" fill="white"/>

        <ellipse cx="149" cy="105" rx="2.5" ry="2.5" fill="#1a0a00"/>

        <circle cx="117" cy="103" r="1.5" fill="white"/>
        <circle cx="151" cy="103" r="1.5" fill="white"/>
        <!-- Eyelashes -->
        <path d="M104 100 Q108 95 113 98" stroke="#1a0a00" stroke-width="1.5" fill="none"/>
        <path d="M138 98 Q143 95 156 100" stroke="#1a0a00" stroke-width="1.5" fill="none"/>

        <!-- Nose -->
        <path d="M126 118 Q130 128 134 118" stroke="#d4956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

        <!-- Lips -->
        <path d="M116 138 Q123 133 130 135 Q137 133 144 138" stroke="#c0604a" stroke-width="1.5" fill="none"/>
        <path d="M116 138 Q130 148 144 138" fill="#e07060" stroke="#c0604a" stroke-width="1"/>

        <!-- Cheeks blush -->
        <ellipse cx="100" cy="120" rx="12" ry="7" fill="#f4a0a0" opacity="0.4"/>
        <ellipse cx="160" cy="120" rx="12" ry="7" fill="#f4a0a0" opacity="0.4"/>

        <!-- === JEWELRY === -->

        <!-- EARRINGS (dangling gold) -->
        <!-- Left earring -->
        <circle cx="78" cy="130" r="5" fill="#FFD700" stroke="#b8960c" stroke-width="1"/>

        <ellipse cx="78" cy="160" rx="7" ry="10" fill="#FFD700" stroke="#b8960c" stroke-width="1"/>
        <ellipse cx="78" cy="160" rx="4" ry="6" fill="#f5e6a0"/>

        <ellipse cx="182" cy="160" rx="4" ry="6" fill="#f5e6a0"/>

        <path d="M100 218 Q130 240 160 218" stroke="#FFD700" stroke-width="2.5" fill="none"/>

        <circle cx="130" cy="240" r="8" fill="#FFD700" stroke="#b8960c" stroke-width="1.5"/>
        <circle cx="130" cy="240" r="4" fill="#e8f0ff"/>

        <circle cx="109" cy="224" r="3" fill="#FFD700"/>
        <circle cx="120" cy="232" r="3" fill="#FFD700"/>
        <circle cx="140" cy="232" r="3" fill="#FFD700"/>
        <circle cx="151" cy="224" r="3" fill="#FFD700"/>

        <path d="M75 218 Q55 230 50 290 L50 480 Q130 510 210 480 L210 290 Q205 230 185 218 Q160 210 130 212 Q100 210 75 218Z" fill="#8B1a4a"/>

        <path d="M130 212 L120 480" stroke="#a0204f" stroke-width="1.5" opacity="0.5" fill="none"/>
        <path d="M130 212 L140 480" stroke="#a0204f" stroke-width="1.5" opacity="0.5" fill="none"/>

        <!-- Décolletage -->
        <path d="M100 218 Q130 250 160 218" fill="#f5c5a3"/>

        <!-- Arms -->
        <!-- Left arm -->
        <path d="M55 245 Q30 300 35 370" stroke="#f5c5a3" stroke-width="22" fill="none" stroke-linecap="round"/>
        <!-- Right arm -->
        <path d="M205 245 Q230 300 225 370" stroke="#f5c5a3" stroke-width="22" fill="none" stroke-linecap="round"/>

        <!-- BANGLES on left wrist -->
        <ellipse cx="35" cy="368" rx="14" ry="5" fill="none" stroke="#FFD700" stroke-width="3"/>
        <ellipse cx="35" cy="376" rx="14" ry="5" fill="none" stroke="#FFD700" stroke-width="3"/>
        <ellipse cx="35" cy="384" rx="14" ry="5" fill="none" stroke="#e86030" stroke-width="3"/>

        <!-- RING on right hand -->
        <ellipse cx="225" cy="368" rx="14" ry="5" fill="none" stroke="#FFD700" stroke-width="3"/>
        <circle cx="225" cy="364" r="5" fill="#FFD700"/>
        <circle cx="225" cy="364" r="3" fill="#88ccff"/>

        <!-- Hands -->
        <ellipse cx="36" cy="392" rx="13" ry="16" fill="#f5c5a3"/>
        <ellipse cx="224" cy="392" rx="13" ry="16" fill="#f5c5a3"/>

        <!-- Dress bottom flare -->
        <path d="M50 400 Q90 520 130 510 Q170 520 210 400" fill="#8B1a4a"/>

        <!-- ANKLET hint at bottom -->
        <path d="M95 508 Q130 516 165 508" stroke="#FFD700" stroke-width="2" fill="none"/>
        <circle cx="130" cy="512" r="3" fill="#FFD700"/>

        <!-- Sparkles around her -->
        <text x="40" y="80" font-size="18" fill="#FFD700" opacity="0.8">✦</text>
        <text x="205" y="90" font-size="14" fill="#FFD700" opacity="0.7">✦</text>
        <text x="220" y="200" font-size="10" fill="#FFD700" opacity="0.6">✦</text>

        <text x="215" y="350" font-size="16" fill="#FFD700" opacity="0.5">✦</text>
